*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.header{background:#fff;border-bottom:3px solid #f97316;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:0 16px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#ea580c,#f97316);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-name{font-family:'Bebas Neue',cursive;font-size:21px;letter-spacing:2px;color:#ea580c;line-height:1;}
.logo-sub{font-size:9px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;}
.tabs-inner{max-width:720px;margin:0 auto;display:flex;}
.tab{background:none;border:none;color:#94a3b8;border-bottom:2px solid transparent;padding:11px 12px;font-weight:600;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab.active{color:#ea580c;border-bottom-color:#ea580c;}
.content{max-width:720px;margin:0 auto;padding:14px;}
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.kpi{border-radius:12px;padding:10px;text-align:center;}
.kpi-val{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;}
.kpi-lbl{font-size:8px;color:#94a3b8;font-weight:600;margin-top:1px;}
.sync-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:9px 14px;margin-bottom:12px;font-size:11px;color:#16a34a;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.install-hint{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:9px 14px;margin-bottom:12px;font-size:11px;color:#1d4ed8;font-weight:500;}
.search-input{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;color:#1e293b;font-size:13px;outline:none;margin-bottom:10px;}
.series-bar{display:flex;gap:5px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.series-btn{background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:4px 11px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;}
.series-btn.active{background:#ea580c;color:#fff;border-color:#ea580c;}
.count-label{font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:10px;}
.product-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.color-chip{display:inline-flex;align-items:center;background:#f1f5f9;border-radius:6px;padding:2px 8px;font-size:11px;color:#475569;font-weight:500;margin-left:6px;}
.color-dot{width:10px;height:10px;border-radius:50%;margin-right:5px;flex-shrink:0;}
.product-meta{font-size:10px;color:#94a3b8;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;font-weight:500;}
.barcode-tag{color:#16a34a;font-weight:600;}
.add-barcode{color:#f97316;font-weight:600;cursor:pointer;}
.badge{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap;}
.qty-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
.qty-btn{width:30px;height:30px;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;font-size:18px;cursor:pointer;line-height:1;}
.qty-val{font-family:'Bebas Neue',cursive;font-size:24px;min-width:30px;text-align:center;color:#ea580c;}
.min-label{font-size:10px;color:#cbd5e1;font-weight:500;}
.action-btns{display:flex;gap:6px;}
.edit-btn{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;}
.del-btn{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;}
.btn-primary{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-outline{background:#fff7ed;border:1px solid #fed7aa;color:#ea580c;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-green{background:#16a34a;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-gray{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.section-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:#ea580c;margin-bottom:2px;}
.section-sub{font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:14px;}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}

.field-label{display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em;}

.kpi3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.bar-wrap{background:#e2e8f0;border-radius:4px;height:7px;flex:1;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.bar-row{margin-bottom:12px;}.bar-label{display:flex;justify-content:space-between;margin-bottom:4px;}
.planner-item{border-radius:10px;padding:11px;margin-bottom:8px;border:1px solid #e2e8f0;}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;color:#fff;padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;animation:sd .2s ease;}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.overlay.bottom{align-items:flex-end;justify-content:center;}

.modal-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:#ea580c;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.close-btn{background:#f1f5f9;border:none;color:#64748b;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;}
.field-wrap{margin-bottom:12px;}
.loading{text-align:center;padding:60px 20px;color:#94a3b8;}
.spin{display:inline-block;font-size:36px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px;background:#f8fafc;border-radius:10px;margin-bottom:8px;border:1px solid #e2e8f0;}
.cart-item-name{flex:1;font-size:13px;font-weight:600;}

.cart-qty{font-family:'Bebas Neue',cursive;font-size:20px;min-width:24px;text-align:center;color:#ea580c;}
.cart-remove{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;}
.hist-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px;margin-bottom:8px;}
.hist-badge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;}

.scan-line{position:absolute;top:50%;left:0;right:0;height:2px;background:#ea580c;opacity:.8;animation:scanMove 2s ease-in-out infinite;}
@keyframes scanMove{0%,100%{top:30%}50%{top:70%}}

function boot(){

    }
    return p;
  }).then(function(p){
    products=p;
    return dbGet("logs","?order=created_at.desc");
  }).then(function(l){
    logs=l;
    return dbGet("history","?order=changed_at.desc&changed_at=gte."+new Date(Date.now()-30*864e5).toISOString());
  }).then(function(h){
    auditLog=h;
    lastSync=Date.now();
    if(!currentUser){showUserPicker();}else{render();}

    document.getElementById("app").innerHTML='<div class="loading"><div style="font-size:36px;">&#x26A0;&#xFE0F;</div><div style="margin-top:12px;font-weight:700;color:#dc2626;">Connection error</div><div style="margin-top:6px;font-size:12px;color:#64748b;">'+e.message+'</div><button onclick="boot()" style="margin-top:20px;background:#ea580c;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:700;font-size:13px;cursor:pointer;font-family:\'DM Sans\',sans-serif;">Try Again</button></div>';
  });
}

function addToCart(prod){
  var ex=cart.find(function(i){return i.pid===prod.id;});
  if(ex){ex.qty++;showToast(prod.name+" qty updated");}
  else{cart.push({pid:prod.id,name:prod.name,color:prod.color||"",price:prod.price||0,qty:1});}
}

function confirmOrder(){
  if(cart.length===0){showToast("Cart is empty","err");return;}
  var person=document.getElementById("orderPerson")?document.getElementById("orderPerson").value:"";
  var channel=document.getElementById("orderChannel")?document.getElementById("orderChannel").value:"Retail";
  var project=document.getElementById("orderProject")?document.getElementById("orderProject").value:"";
  var date=document.getElementById("orderDate")?document.getElementById("orderDate").value:TODAY;
  if(!person.trim()){showToast("Please enter who this is for","err");return;}
  localStorage.setItem("jcb_lastPerson",person);
  for(var i=0;i<cart.length;i++){
    var item=cart[i];
    var prod=products.find(function(p){return p.id===item.pid;});
    if(!prod||prod.qty<item.qty){showToast("Not enough stock: "+item.name,"err");return;}
  }
  var totalQty=cart.reduce(function(s,i){return s+i.qty;},0);
  var totalVal=cart.reduce(function(s,i){return s+(i.qty*(i.price||0));},0);
  var first=cart[0];
  var cartCopy=cart.slice();
  dbGet("logs","?select=name&order=id.desc&limit=1").then(function(allLogs){
    var last=allLogs&&allLogs.length>0&&allLogs[0].name?parseInt(allLogs[0].name.replace("ORD-",""),10)||0:0;
    var orderNum=String(last+1).padStart(4,"0");
    var orderLabel="ORD-"+orderNum;
    return dbPost("logs",{id:Date.now(),name:orderLabel,color:"",pid:first.pid,qty:totalQty,price:totalQty>0?totalVal/totalQty:0,ch:channel,person:person,project:project,date:date,items:JSON.stringify(cartCopy),ret:null,st:"Out"});
  }).then(function(){
    var chain=Promise.resolve();
    cartCopy.forEach(function(item){
      chain=chain.then(function(){
        var prod=products.find(function(p){return p.id===item.pid;});
        if(!prod)return;
        var oldQty=prod.qty;
        var nq=Math.max(0,oldQty-item.qty);
        prod.qty=nq;
        return dbPatch("products","id=eq."+item.pid,{qty:nq}).then(function(){
          return logHistory(prod,oldQty,nq,"checkout",currentUser,"Order for "+person+" via "+channel+(project?" - "+project:""));
        });
      });
    });
    return chain;
  }).then(function(){
    cart=[];
    showToast("Order confirmed! "+totalQty+" bags out");
    return doRefresh();
  }).catch(function(e){showToast("Order failed: "+e.message,"err");});
}

function openScanner(){
  document.body.insertAdjacentHTML("beforeend",'<div class="overlay bottom" id="mScan"><div class="modal sheet" style="padding:20px;"><div class="modal-header"><div class="modal-title">&#x1F4F7; BARCODE SCANNER</div><button class="close-btn" id="scanClose">&times;</button></div><div style="font-size:12px;color:#64748b;margin-bottom:12px;">Point camera at a barcode on any bag</div><div style="position:relative;"><video id="scannerVideo" autoplay playsinline></video><div class="scan-line"></div></div><div id="scanResult" style="margin-top:12px;padding:12px;background:#f8fafc;border-radius:10px;font-size:13px;color:#94a3b8;text-align:center;">Scanning...</div><div id="scanActions" style="margin-top:10px;display:none;"><button id="btnScanAddCart" class="btn-primary" style="width:100%;margin-bottom:8px;">&#x1F6D2; Add to Cart</button><button id="btnScanView" class="btn-outline" style="width:100%;">&#x1F50D; View Product</button></div></div></div>');

    var qty=parseInt(document.getElementById("f_qty").value);
    var min=parseInt(document.getElementById("f_min").value);
    if(!name||isNaN(qty)||isNaN(min)){showToast("Name, Qty and Min required","err");return;}
    var colorVal=document.getElementById("f_color").value;
    if(colorVal==="__custom__"){colorVal=document.getElementById("f_custom_color")?document.getElementById("f_custom_color").value.trim():"";}
    var item={name:name,barcode:document.getElementById("f_barcode").value.trim(),sku:document.getElementById("f_sku").value.trim(),price:parseFloat(document.getElementById("f_price").value)||0,pack:parseInt(document.getElementById("f_pack").value)||1,qty:qty,min:min,loc:document.getElementById("f_loc").value.trim(),color:colorVal,series:document.getElementById("f_series").value};
    if(editId){
      var old=products.find(function(p){return p.id===editId;});
      dbPatch("products","id=eq."+editId,item).then(function(){
        if(!old)return;
        var changes=[];
        if((old.name||"")!==(item.name||""))changes.push("name: "+old.name+" → "+item.name);
        if((old.color||"")!==(item.color||""))changes.push("color: "+(old.color||"none")+" → "+(item.color||"none"));
        if(Number(old.price||0)!==Number(item.price||0))changes.push("price: $"+old.price+" → $"+item.price);
        if(Number(old.pack||1)!==Number(item.pack||1))changes.push("pack: "+old.pack+" → "+item.pack);
        if((old.loc||"")!==(item.loc||""))changes.push("loc: "+(old.loc||"")+" → "+(item.loc||""));
        if((old.sku||"")!==(item.sku||""))changes.push("sku: "+(old.sku||"")+" → "+(item.sku||""));
        if(old.qty!==qty)changes.push("qty: "+old.qty+" → "+qty);
        if(changes.length>0)return logHistory(Object.assign({},old,item),old.qty,qty,"edit",currentUser,changes.join("; "));
      }).then(function(){showToast("Updated!");document.getElementById("mItem").remove();return doRefresh();}).catch(function(e){showToast("Error: "+e.message,"err");});
    }else{
      var newId=Date.now();
      dbPost("products",Object.assign({},item,{id:newId})).then(function(){return logHistory(Object.assign({},item,{id:newId}),0,qty,"add",currentUser,"New product added");}).then(function(){showToast("Added!");document.getElementById("mItem").remove();return doRefresh();}).catch(function(e){showToast("Error: "+e.message,"err");});
    }
  };
}

function delModal(id){
  document.body.insertAdjacentHTML("beforeend",'<div class="overlay" id="mDel"><div class="modal"><div style="font-weight:700;font-size:16px;margin-bottom:8px;">Remove Variant?</div><div style="color:#64748b;font-size:13px;margin-bottom:20px;">This permanently removes the product from the database.</div><div style="display:flex;gap:10px;"><button style="flex:1;background:#f1f5f9;border:none;color:#475569;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;" id="dCancel">Cancel</button><button style="flex:1;background:#dc2626;border:none;color:#fff;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-family:\'DM Sans\',sans-serif;" id="dConfirm">Delete</button></div></div></div>');
  document.getElementById("dCancel").onclick=function(){document.getElementById("mDel").remove();};
  document.getElementById("dConfirm").onclick=function(){
    var prod=products.find(function(p){return p.id===id;});
    dbDelete("products","id=eq."+id).then(function(){if(prod)return logHistory(prod,prod.qty,0,"delete",currentUser,"Product removed");}).then(function(){showToast("Removed");document.getElementById("mDel").remove();return doRefresh();}).catch(function(){showToast("Error","err");});
  };
}

function wire(){
  document.querySelectorAll(".tab").forEach(function(b){b.onclick=function(){activeTab=b.dataset.tab;render();};});
  var btnAdd=document.getElementById("btnAdd");if(btnAdd)btnAdd.onclick=function(){addModal();};
  var btnCO=document.getElementById("btnCO");if(btnCO)btnCO.onclick=function(){activeTab="co";render();};
  var btnCO2=document.getElementById("btnCO2");if(btnCO2)btnCO2.onclick=function(){addModal();};
  var btnScan=document.getElementById("btnScan");if(btnScan)btnScan.onclick=function(){openScanner();};
  var btnR=document.getElementById("btnRefresh");if(btnR)btnR.onclick=function(){btnR.textContent="...";doRefresh().then(function(){btnR.textContent="&#x1F504;";});};
  var si=document.getElementById("searchInput");if(si)si.oninput=function(e){var pos=e.target.selectionStart;search=e.target.value;render();var ns=document.getElementById("searchInput");if(ns){ns.focus();ns.setSelectionRange(pos,pos);}};
  document.querySelectorAll(".series-btn").forEach(function(b){b.onclick=function(){activeSeries=b.dataset.series;render();};});
  // Color search tabs
  document.querySelectorAll("[data-colorsearch]").forEach(function(b){b.onclick=function(){
    if(search===b.dataset.colorsearch){search="";}else{search=b.dataset.colorsearch;}
    render();
  };});
  // Custom color toggle
  var fcolor=document.getElementById("f_color");
  if(fcolor){fcolor.onchange=function(){
    var wrap=document.getElementById("customColorWrap");
    if(wrap)wrap.style.display=fcolor.value==="__custom__"?"block":"none";
  };}
  document.querySelectorAll("[data-adj]").forEach(function(b){b.onclick=function(){
    var id=parseInt(b.dataset.adj),d=parseInt(b.dataset.d);
    var p=products.find(function(x){return x.id===id;});if(!p)return;
    var nq=Math.max(0,p.qty+d);
    products=products.map(function(x){return x.id===id?Object.assign({},x,{qty:nq}):x;});render();
    dbPatch("products","id=eq."+id,{qty:nq}).then(function(){return logHistory(p,p.qty,nq,d>0?"+":"-",currentUser,"Manual adjustment");}).catch(function(){showToast("Sync error","err");doRefresh();});
  };});
  document.querySelectorAll("[data-addcart]").forEach(function(b){b.onclick=function(){
    var prod=products.find(function(p){return p.id===parseInt(b.dataset.addcart);});
    if(!prod)return;
    if(prod.qty===0){showToast("Out of stock","err");return;}
    addToCart(prod);render();showToast(prod.name+(prod.color?" - "+prod.color:"")+" added to cart!");
  };});
  document.querySelectorAll("[data-cartadj]").forEach(function(b){b.onclick=function(){
    var idx=parseInt(b.dataset.cartadj),d=parseInt(b.dataset.d);
    var item=cart[idx];if(!item)return;
    var prod=products.find(function(p){return p.id===item.pid;});
    item.qty=Math.max(1,item.qty+d);
    if(prod&&item.qty>prod.qty){item.qty=prod.qty;showToast("Max stock reached");}
    render();
  };});
  document.querySelectorAll("[data-cartrem]").forEach(function(b){b.onclick=function(){cart.splice(parseInt(b.dataset.cartrem),1);render();};});
  var btnConfirm=document.getElementById("btnConfirmOrder");if(btnConfirm)btnConfirm.onclick=function(){confirmOrder();};
  var btnClear=document.getElementById("btnClearCart");if(btnClear)btnClear.onclick=function(){cart=[];render();};
  document.querySelectorAll("[data-edit]").forEach(function(b){b.onclick=function(){addModal(parseInt(b.dataset.edit));};});
  document.querySelectorAll("[data-del]").forEach(function(b){b.onclick=function(){delModal(parseInt(b.dataset.del));};});
  document.querySelectorAll("[data-logf]").forEach(function(b){b.onclick=function(){logFilter=b.dataset.logf;render();};});
  document.querySelectorAll("[data-histf]").forEach(function(b){b.onclick=function(){histFilter=b.dataset.histf;render();};});
  document.querySelectorAll("[data-ret]").forEach(function(b){b.onclick=function(){
    var id=parseInt(b.dataset.ret);var log=logs.find(function(l){return l.id===id;});if(!log)return;
    dbPatch("logs","id=eq."+id,{ret:TODAY,st:"Returned"}).then(function(){
      var p=products.find(function(x){return x.id===log.pid;});
      if(p){var nq=p.qty+log.qty;return dbPatch("products","id=eq."+p.id,{qty:nq}).then(function(){return logHistory(p,p.qty,nq,"checkout",currentUser,"Return from "+(log.person||"customer"));});}
    }).then(function(){showToast("Returned!");return doRefresh();}).catch(function(){showToast("Error","err");});
  };});
  var rs=document.getElementById("rngSel");if(rs)rs.onchange=function(e){rng=e.target.value;render();};
  var rv2=document.getElementById("rvSel");if(rv2)rv2.onchange=function(e){rv=e.target.value;render();};
  document.querySelectorAll("[data-itype]").forEach(function(b){b.onclick=function(){iType=b.dataset.itype;iPrev=null;iMsg="";render();};});
  var iTA=document.getElementById("iTA");if(iTA)iTA.oninput=function(e){iText=e.target.value;};
  var btnPreview=document.getElementById("btnPreview");
  if(btnPreview)btnPreview.onclick=function(){
    var lines=iText.trim().split("\n").filter(Boolean);
    if(!lines.length){iMsg="Paste data first.";iPrev=null;render();return;}
    var prev=[],um=[];
    lines.forEach(function(line){
      var pts=line.split(/[\t,]/).map(function(s){return s.trim().replace(/^"|"$/g,"");});
      if(pts.length<2)return;
      var c1=pts[0],c2=pts[1],c3=pts[2];
      if(iType==="barcodes"){
        var p=products.find(function(p){return p.sku&&p.sku.toLowerCase()===c1.toLowerCase();});
        if(!p&&c3)p=products.find(function(p){return p.name.toLowerCase()===c1.toLowerCase()&&(p.color||"").toLowerCase()===c2.toLowerCase();});
        if(!p)p=products.find(function(p){return p.name.toLowerCase()===c1.toLowerCase();});
        if(p)prev.push({id:p.id,name:p.name,color:p.color,barcode:c3||c2});else um.push(c1);
      }else{
        var qty=parseInt(c3||c2);if(isNaN(qty))return;
        var p2=products.find(function(p){return p.name.toLowerCase().indexOf(c1.toLowerCase())>=0&&(p.color||"").toLowerCase().indexOf(c2.toLowerCase())>=0;});
        if(!p2)p2=products.find(function(p){return (p.color||"").toLowerCase().indexOf(c1.toLowerCase())>=0&&p.name.toLowerCase().indexOf(c2.toLowerCase())>=0;});
        if(p2)prev.push({id:p2.id,name:p2.name,color:p2.color,qty:qty});else um.push(c1+"/"+c2);
      }
    });
    iPrev=prev;iMsg="Matched "+prev.length+(um.length?" - Unmatched: "+um.slice(0,4).join(", ")+(um.length>4?"...":""):"");render();
  };
  var btnApply=document.getElementById("btnApply");
  if(btnApply)btnApply.onclick=function(){
    if(!iPrev||!iPrev.length)return;
    var chain=Promise.resolve();
    iPrev.forEach(function(m){chain=chain.then(function(){
      if(iType==="barcodes")return dbPatch("products","id=eq."+m.id,{barcode:m.barcode});
      var p=products.find(function(x){return x.id===m.id;});
      return dbPatch("products","id=eq."+m.id,{qty:m.qty}).then(function(){if(p)return logHistory(p,p.qty,m.qty,"adjustment",currentUser,"Bulk import update");});
    });});
    chain.then(function(){showToast("Applied "+iPrev.length+" updates!");iPrev=null;iText="";iMsg="";return doRefresh();}).catch(function(){showToast("Import error","err");});
  };
  var bEI=document.getElementById("btnExpInv");if(bEI)bEI.onclick=function(){exportCSV(products,"jcb-inventory.csv",["name","color","series","sku","barcode","price","pack","qty","min","loc"]);};
  var bEL=document.getElementById("btnExpLogs");if(bEL)bEL.onclick=function(){exportCSV(logs,"jcb-checkout-log.csv",["name","color","qty","price","ch","person","project","date","ret","st"]);};
  var bEH=document.getElementById("btnExpHist")||document.getElementById("btnExportHist");if(bEH)bEH.onclick=function(){exportCSV(auditLog,"jcb-history.csv",["product_name","color","change_type","qty_before","qty_after","changed_by","note","changed_at"]);};
}

boot();
</script>
</body>
</html>
