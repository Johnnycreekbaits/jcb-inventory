<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.header{background:#fff;border-bottom:3px solid #f97316;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:0 16px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#ea580c,#f97316);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-name{font-family:'Bebas Neue',cursive;font-size:21px;letter-spacing:2px;color:#ea580c;line-height:1;}
.logo-sub{font-size:9px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;}
.tabs-inner{max-width:720px;margin:0 auto;display:flex;}
.tab{background:none;border:none;color:#94a3b8;border-bottom:2px solid transparent;padding:11px 12px;font-weight:600;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab.active{color:#ea580c;border-bottom-color:#ea580c;}
.content{max-width:720px;margin:0 auto;padding:14px;}
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.section-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:#ea580c;margin-bottom:2px;}
.section-sub{font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:14px;}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.kpi{border-radius:12px;padding:12px;text-align:center;}
.kpi-val{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;}
.kpi-lbl{font-size:9px;color:#94a3b8;font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.kpi-sub{font-size:10px;font-weight:600;margin-top:2px;}
.btn-primary{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-outline{background:#fff7ed;border:1px solid #fed7aa;color:#ea580c;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-gray{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-green{background:#16a34a;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.field-label{display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em;}
.field-input{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;color:#1e293b;font-size:13px;outline:none;}
.field-wrap{margin-bottom:12px;}
.period-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.period-btn{background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.period-btn.active{background:#ea580c;color:#fff;border-color:#ea580c;}
.pl-section-hd{font-size:9px;font-weight:700;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;padding:12px 0 6px;}
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:13px;}
.pl-row:last-child{border-bottom:none;}
.pl-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-top:2px solid #e2e8f0;margin-top:4px;font-weight:700;font-size:14px;}
.profit-box{border-radius:12px;padding:14px;margin:10px 0;}
.bar-wrap{background:#e2e8f0;border-radius:4px;height:7px;flex:1;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-row{margin-bottom:10px;}
.bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.exp-item:last-child{border-bottom:none;}
.exp-cat{background:#f1f5f9;color:#475569;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;white-space:nowrap;}
.hint-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:11px;color:#92400e;font-weight:500;line-height:1.9;}
.preview-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #dcfce7;font-size:11px;}
.del-btn{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;flex-shrink:0;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;color:#fff;padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;animation:sd .2s ease;}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.loading{text-align:center;padding:60px 20px;color:#94a3b8;}
.spin{display:inline-block;font-size:36px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#fff7ed,#fff);}
.login-card{background:#fff;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);border:1px solid #fed7aa;}
@media print{.no-print{display:none!important;}.content{padding:0;max-width:100%;}}
</style>

<script>

var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnam5hc3hhc213enZ5d2drZ2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODQ3NjYsImV4cCI6MjA5NDg2MDc2Nn0.kBEkFRW1pe5BAU_P4fhZFcbzBMxfUR2q5-Tvxq16vB8";
var HDR={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};

function dbGet(t,q){return fetch(SB_URL+"/rest/v1/"+t+(q||""),{headers:HDR}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error(e);});return r.json();});}
function dbPost(t,b){return fetch(SB_URL+"/rest/v1/"+t,{method:"POST",headers:Object.assign({},HDR,{"Prefer":"resolution=merge-duplicates,return=minimal"}),body:JSON.stringify(b)}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error(e);});});}
function dbDelete(t,f){return fetch(SB_URL+"/rest/v1/"+t+"?"+f,{method:"DELETE",headers:HDR}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error(e);});});}

var DEFAULT_COSTS=[
  {id:"baby-hawg",name:"Baby Hawg",series:"Baby Hawgs",unit:"bag",cogs:1.04},
  {id:"craw",name:"Craw",series:"Craws",unit:"bag",cogs:1.04},
  {id:"finesse-worm",name:"6in Finesse Worm",series:"Finesse Worms",unit:"bag",cogs:1.04},
  {id:"neko",name:"Neko",series:"Nekos",unit:"bag",cogs:1.04},
  {id:"stickbait",name:"Stick Bait",series:"Stick Baits",unit:"bag",cogs:1.04},
  {id:"soft-jerk",name:"Soft Jerk",series:"Soft Jerk",unit:"bag",cogs:1.04},
  {id:"terp-minnow",name:"Terp Minnow",series:"Terp Minnow",unit:"bag",cogs:1.04},
  {id:"paddle-tail",name:"Paddle Tail",series:"Paddle Tail",unit:"bag",cogs:1.04},
  {id:"kanji-ball",name:"Kanji Ball",series:"Kanji Ball",unit:"bait",cogs:1.04},
  {id:"jc-walker",name:"JC Walker",series:"JC Walker",unit:"bait",cogs:6.31},
  {id:"xg8-glide",name:"XG8 Glide",series:"Glidebait",unit:"bait",cogs:44.25}
];
function loadCosts(){
  var s=localStorage.getItem("jcb_costs");
  var saved=null;
  if(s){try{saved=JSON.parse(s);}catch(e){}}
  if(!saved)return DEFAULT_COSTS.map(function(c){return Object.assign({},c);});
  var result=saved.slice();
  DEFAULT_COSTS.forEach(function(def){
    var existing=result.find(function(r){return r.id===def.id;});
    if(!existing){result.push(Object.assign({},def));}
    else if(!existing.series){existing.series=def.series;}
  });
  return result;
}
var costProfiles=loadCosts();
function saveCosts(){localStorage.setItem("jcb_costs",JSON.stringify(costProfiles));}
var EXP_CATS=["Advertising","Auto and Truck Expense","Dues and Subscriptions","Employee Meals","Federal Excise Tax","Fuel Expense","Interest Expense","Legal and Accounting","Office Expense","Other Taxes, Fees & Licenses","Outside Services","Payroll","Penalties","Repairs and Maintenance","Shop Expense","Supplies and Small Tools","Training Expense","Travel Expense","Utilities Expense"];
var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getChannelPrice(prod,channel){
  if(channel==="Sample/Promo"||channel==="Internal"||channel==="Sponsorship")return 0;
  if(prod&&prod.pack>=8&&prod.price>0&&prod.price<=7.50){
    if(channel==="Wholesale"||channel==="Tournament")return 3.50;
    if(channel==="Distribution")return 2.80;
  }
  return prod?prod.price:0;
}
function matchCostProfile(prod){
  if(!prod)return null;
  var s=(prod.series||"").toLowerCase();
  var n=(prod.name||"").toLowerCase();
  var match=costProfiles.find(function(c){return c.series&&c.series.toLowerCase()===s;});
  if(match)return match;
  match=costProfiles.find(function(c){
    var cn=c.name.toLowerCase();
    return n.indexOf(cn)>=0||cn.split(" ").some(function(w){return w.length>=5&&n.indexOf(w)>=0;});
  });
  return match||null;
}
function getItemCOGS(qty,prod){var cp=matchCostProfile(prod);return cp?cp.cogs*qty:0;}
function calcOrder(log,prods){
  var items=[];try{if(log.items)items=JSON.parse(log.items);}catch(e){}
  var rev=0,cogs=0;
  if(items.length>0){
    items.forEach(function(item){
      var p=prods.find(function(x){return x.id===item.pid;});
      rev+=item.qty*getChannelPrice(p||{price:item.price||0,pack:8},log.ch||"Retail");
      cogs+=getItemCOGS(item.qty,p);
    });
  }else{
    var p=prods.find(function(x){return x.id===log.pid;});
    rev+=log.qty*getChannelPrice(p||{price:log.price||0,pack:8},log.ch||"Retail");
    cogs+=getItemCOGS(log.qty,p);
  }
  return{rev:rev,cogs:cogs};
}

async function hashPw(pw){
  var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
}

var products=[],logs=[],expenses=[],expReady=true;
var activeTab="dash",period="month";
var expMonth=new Date().toISOString().slice(0,7);
var impText="",impPrev=null,impMsg="";

function fmt$(n){return"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPct(n){return n.toFixed(1)+"%";}
function showToast(msg,type){var t=document.createElement("div");t.className="toast";t.style.background=type==="err"?"#dc2626":type==="info"?"#2563eb":"#16a34a";t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}

function getPeriodRange(){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==="month")return{start:new Date(y,m,1),end:new Date(y,m+1,0)};
  if(period==="lastmonth"){var pm=m-1,py=y;if(pm<0){pm=11;py--;}return{start:new Date(py,pm,1),end:new Date(py,pm+1,0)};}
  if(period==="quarter"){var q=Math.floor(m/3);return{start:new Date(y,q*3,1),end:new Date(y,q*3+3,0)};}
  if(period==="lastquarter"){var q=Math.floor(m/3)-1,qy=y;if(q<0){q=3;qy--;}return{start:new Date(qy,q*3,1),end:new Date(qy,q*3+3,0)};}
  if(period==="year")return{start:new Date(y,0,1),end:new Date(y,11,31)};
  if(period==="lastyear")return{start:new Date(y-1,0,1),end:new Date(y-1,11,31)};}

function getPeriodMonths(){
  var r=getPeriodRange(),months=[],d=new Date(r.start.getFullYear(),r.start.getMonth(),1);
  while(d<=r.end){months.push(d.toISOString().slice(0,7));d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  return months;
}
function getPeriodLogs(){var r=getPeriodRange();return logs.filter(function(l){var d=new Date(l.date);return d>=r.start&&d<=r.end;});}
function getPeriodExpenses(){if(!expReady)return[];var ms=getPeriodMonths();return expenses.filter(function(e){return ms.indexOf(e.month)>=0;});}

function calcSummary(fl,fe){
  var rev=0,cogs=0,expTotal=0;
  fl.forEach(function(l){var o=calcOrder(l,products);rev+=o.rev;cogs+=o.cogs;});
  fe.forEach(function(e){expTotal+=Number(e.amount);});
  var gross=rev-cogs,net=gross-expTotal;
  return{rev:rev,cogs:cogs,gross:gross,grossPct:rev>0?(gross/rev)*100:0,expenses:expTotal,net:net,netPct:rev>0?(net/rev)*100:0,orders:fl.length};
}

function periodLabel(){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(period==="month")return MONTHS[m]+" "+y;
  if(period==="lastmonth"){var pm=m-1,py=y;if(pm<0){pm=11;py--;}return MONTHS[pm]+" "+py;}
  if(period==="quarter")return"Q"+(Math.floor(m/3)+1)+" "+y;
  if(period==="lastquarter"){var q=Math.floor(m/3)-1,qy=y;if(q<0){q=3;qy--;}return"Q"+(q+1)+" "+qy;}
  if(period==="year")return"Full Year "+y;
  if(period==="lastyear")return"Full Year "+(y-1);
  return"";
}

function boot(){
  if(!sessionStorage.getItem("jcb_finance_auth")){showLogin();return;}
  Promise.all([
    dbGet("products","?order=name,color"),
    dbGet("logs","?order=date.desc"),
    dbGet("expenses","?order=month.desc,created_at.desc").catch(function(){expReady=false;return[];})
  ]).then(function(res){
    products=res[0];logs=res[1];expenses=res[2];render();
  }).catch(function(e){
    document.getElementById("app").innerHTML='<div class="loading"><div style="font-size:36px;">&#x26A0;&#xFE0F;</div><div style="margin-top:12px;font-weight:700;color:#dc2626;">Connection error</div><div style="font-size:12px;color:#64748b;margin-top:6px;">'+e.message+'</div><button onclick="boot()" style="margin-top:20px;background:#ea580c;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:700;font-size:13px;cursor:pointer;font-family:\'DM Sans\',sans-serif;">Try Again</button></div>';
  });
}

function showLogin(){
  document.getElementById("app").innerHTML='<div class="login-wrap"><div class="login-card"><div style="text-align:center;margin-bottom:24px;"><div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#ea580c,#f97316);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;">&#x1F4B0;</div><div style="font-family:\'Bebas Neue\',cursive;font-size:28px;color:#ea580c;letter-spacing:2px;">JCB FINANCE</div><div style="font-size:12px;color:#94a3b8;margin-top:4px;">Owner &amp; Investor Portal</div></div><div class="field-wrap"><label class="field-label">Password</label><input class="field-input" type="password" id="pwInput" placeholder="Enter password" style="font-size:16px;" autocomplete="current-password"/></div><div id="loginErr" style="color:#dc2626;font-size:12px;margin-bottom:10px;display:none;">Incorrect password. Try again.</div><button class="btn-primary" id="btnLogin" style="width:100%;padding:13px;font-size:14px;">Sign In</button></div></div>';
  var inp=document.getElementById("pwInput");
  document.getElementById("btnLogin").onclick=function(){hashPw(inp.value).then(function(h){if(h===PW_HASH){sessionStorage.setItem("jcb_finance_auth","1");boot();}else{document.getElementById("loginErr").style.display="block";inp.value="";inp.focus();}});};
  inp.onkeydown=function(e){if(e.key==="Enter")document.getElementById("btnLogin").click();};
  inp.focus();
}

function render(){
  var html="";
  if(activeTab==="dash")html=dashHTML();
  else if(activeTab==="prod")html=prodHTML();
  else if(activeTab==="pl")html=plHTML();
  else if(activeTab==="exp")html=expHTML();
  else if(activeTab==="costs")html=costsHTML();
  else html=reportHTML();
  document.getElementById("app").innerHTML=hdrHTML()+tabsHTML()+'<div class="content">'+html+"</div>";
  wire();
}

function hdrHTML(){
  return'<div class="header no-print"><div class="header-inner"><div class="logo"><div class="logo-icon">&#x1F4B0;</div><div><div class="logo-name">JCB Finance</div><div class="logo-sub">Owner Portal</div></div></div><button class="btn-gray" id="btnLogout" style="font-size:11px;padding:6px 12px;">Sign Out</button></div></div>';
}
function tabsHTML(){
  var tabs=[{id:"dash",i:"&#x1F4CA;",l:"Dashboard"},{id:"prod",i:"&#x1F4E6;",l:"Production"},{id:"pl",i:"&#x1F4C8;",l:"P&L"},{id:"exp",i:"&#x1F4CB;",l:"Expenses"},{id:"costs",i:"&#x1F527;",l:"Costs"},{id:"rep",i:"&#x1F4C4;",l:"Report"}];
  return'<div class="tabs no-print"><div class="tabs-inner">'+tabs.map(function(t){return'<button class="tab'+(activeTab===t.id?" active":"")+'" data-tab="'+t.id+'">'+t.i+" "+t.l+"</button>";}).join("")+"</div></div>";
}
function periodBarHTML(){
  var opts=[{id:"month",l:"This Month"},{id:"lastmonth",l:"Last Month"},{id:"quarter",l:"This Quarter"},{id:"lastquarter",l:"Last Quarter"},{id:"year",l:"This Year"},{id:"lastyear",l:"Last Year"}];
  return'<div class="period-bar no-print">'+opts.map(function(o){return'<button class="period-btn'+(period===o.id?" active":"")+'" data-period="'+o.id+'">'+o.l+"</button>";}).join("")+"</div>";
}

function dashHTML(){
  var fl=getPeriodLogs(),fe=getPeriodExpenses(),s=calcSummary(fl,fe);
  var byChannel={};
  fl.forEach(function(l){var ch=l.ch||"Other";if(!byChannel[ch])byChannel[ch]={rev:0,cogs:0};var o=calcOrder(l,products);byChannel[ch].rev+=o.rev;byChannel[ch].cogs+=o.cogs;});
  var chList=Object.entries(byChannel).sort(function(a,b){return b[1].rev-a[1].rev;});
  var maxRev=chList.length?chList[0][1].rev:1;
  var noExp=!expReady?'<div class="hint-box">&#x26A0;&#xFE0F; <strong>Expenses table not set up.</strong> Net profit reflects gross profit only. Go to the Expenses tab for setup instructions.</div>':"";
  if(fl.length===0)return periodBarHTML()+noExp+'<div class="section-title">DASHBOARD</div><div class="section-sub">'+periodLabel()+'</div><div class="card" style="text-align:center;padding:40px 20px;color:#94a3b8;"><div style="font-size:36px;margin-bottom:10px;">&#x1F4CA;</div><div style="font-weight:600;">No orders in this period</div></div>';

  var bpe=document.getElementById("btnPreviewExp");
  if(bpe)bpe.onclick=function(){
    var lines=impText.trim().split("\n").filter(Boolean);
    if(!lines.length){impMsg="Paste data first.";impPrev=null;render();return;}
    var prev=[],bad=[];
    lines.forEach(function(line){
      var pts=line.split(/\s*\|\s*|\t|,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(function(s){return s.trim().replace(/^"|"$/g,"");});
      var cat,desc,amt;
      if(pts.length>=3){cat=pts[0];desc=pts[1];amt=parseFloat(pts[2]);}
      else if(pts.length===2){cat=pts[0];desc=pts[0];amt=parseFloat(pts[1]);}
      else{bad.push(line);return;}
      if(isNaN(amt)){bad.push(line);return;}
      var mc=EXP_CATS.find(function(c){return c.toLowerCase().indexOf(cat.toLowerCase())>=0||cat.toLowerCase().indexOf(c.toLowerCase().split(" ")[0])>=0;});
      prev.push({id:Date.now()+(Math.random()*9999|0),month:expMonth,category:mc||cat,description:desc,amount:amt,created_by:"Owner"});
    });
    impPrev=prev.length?prev:null;
    impMsg="Matched "+prev.length+" rows"+(bad.length?" &middot; "+bad.length+" unmatched":"");
    render();
    var ta2=document.getElementById("expTA");if(ta2)ta2.value=impText;
  };
  var bae=document.getElementById("btnApplyExp");
  if(bae)bae.onclick=function(){
    if(!impPrev||!impPrev.length)return;
    dbPost("expenses",impPrev).then(function(){
      showToast("Saved "+impPrev.length+" expenses!");
      expenses=expenses.concat(impPrev);
      impPrev=null;impText="";impMsg="";render();
    }).catch(function(e){showToast("Error: "+e.message,"err");});
  };
  document.querySelectorAll(".cp-inp").forEach(function(inp){
    inp.onchange=function(){
      var idx=parseInt(inp.dataset.cpidx);
      var val=parseFloat(inp.value);
      if(!isNaN(val)&&val>=0){costProfiles[idx].cogs=val;saveCosts();showToast("Saved ✓");}
      else inp.value=costProfiles[idx].cogs.toFixed(2);
    };
  });
  document.querySelectorAll("[data-delcp]").forEach(function(b){
    b.onclick=function(){
      var idx=parseInt(b.dataset.delcp);
      if(!confirm("Remove "+costProfiles[idx].name+" from cost profiles?"))return;
      costProfiles.splice(idx,1);saveCosts();render();
    };
  });
  var btnAddCp=document.getElementById("btnAddCp");
  if(btnAddCp)btnAddCp.onclick=function(){
    var name=(document.getElementById("cpNewName").value||"").trim();
    var unit=document.getElementById("cpNewUnit").value;
    var cogs=parseFloat(document.getElementById("cpNewCogs").value);
    if(!name||isNaN(cogs)||cogs<0){showToast("Fill in all fields","err");return;}
    var id=name.toLowerCase().replace(/[^a-z0-9]+/g,"-");
    costProfiles.push({id:id,name:name,unit:unit,cogs:cogs});
    saveCosts();showToast("Added "+name+"!");render();
  };
  document.querySelectorAll("[data-delexp]").forEach(function(b){
    b.onclick=function(){
      var id=parseInt(b.dataset.delexp);
      if(!confirm("Delete this expense?"))return;
      dbDelete("expenses","id=eq."+id).then(function(){
        expenses=expenses.filter(function(e){return e.id!==id;});
        showToast("Deleted");render();
      }).catch(function(){showToast("Error","err");});
    };
  });
}

boot();
</script>
</body>
</html>
